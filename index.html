<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday</title>

<style>

body{
background:pink;
text-align:center;
font-family:Arial;
overflow-x:hidden;
}

/* Heading */

h1{
margin-top:40px;
}

/* Button */

button{
padding:12px 25px;
font-size:18px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* Gallery */

.gallery{
display:none;
margin-top:30px;
}

/* Images */

.gallery img{
width:260px;
border-radius:20px;
animation:breathing 4s infinite ease-in-out;
}

/* Breathing zoom */

@keyframes breathing{

0%{transform:scale(1);}

50%{transform:scale(1.1);}

100%{transform:scale(1);}

}

/* Floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-1000px);}
}

</style>

</head>

<body>

<h1>Happy Birthday Mahesh Babu ❤️</h1>

<button onclick="start()">PLZ CLICK BUTTON 🎉</button>

<div class="gallery" id="gallery">

<img src="mahesh babu.jpg">
<img src="mahesh babu1.jpg">
<img src="mahesh babu2.jpg">
<img src="mahesh babu3.jpg">

</div>


<script>

/* Button click */

function start(){

document.getElementById("gallery").style.display="block";

}

/* Floating hearts + butterflies + flowers */

setInterval(function(){

let heart = document.createElement("div");

heart.className="heart";

let icons = ["❤️","💖","💗","🦋","🌸","🌺"];

heart.innerHTML = icons[Math.floor(Math.random()*icons.length)];

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>

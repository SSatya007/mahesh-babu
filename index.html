<!DOCTYPE html>
<html>

<head>

<title>Happy Birthday BABU</title>

<style>

body{
margin:0;
background:pink;
text-align:center;
font-family:Arial;
overflow-x:hidden;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-1000px);}
}

/* Heading */

h1{
margin-top:120px;
font-size:50px;
}

/* Button */

button{
padding:15px 35px;
font-size:22px;
background:red;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

/* Gallery */

.gallery{
display:none;
margin-top:40px;
}

.gallery img{
width:350px;
margin:15px;
border-radius:20px;
animation:zoom 4s infinite;
transition:0.6s;
}
/* Zoom animation */
@keyframes zoom{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}  
}

</style>

</head>
<body>

<h1 id="text"></h1>

<button id="startBtn" onclick="start()">Start the Celebration 🎉</button>

<!-- Butterflies ikkada pettali -->

<div class="butterfly" style="animation-delay:0s">🦋</div>
<div class="butterfly" style="animation-delay:3s">🦋</div>
<div class="butterfly" style="animation-delay:6s">🦋</div>

<div class="gallery" id="gallery">

<img src="mahesh babu.jpg">
<img src="mahesh babu1.jpg">
<img src="mahesh babu2.jpg">
<img src="mahesh babu3.jpg">

</div>

</body>


<script>

/* Typing effect */

let msg = "Happy Birthday Mahesh Babu TO YOU ❤️";
let i = 0;

function typing(){

if(i < msg.length){

document.getElementById("text").innerHTML += msg.charAt(i);

i++;

setTimeout(typing,80);

}

}

typing();


/* Start button */

function start(){

document.getElementById("gallery").style.display="block";

}


/* Floating hearts */

setInterval(function(){

let heart = document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>


</body>

</html>

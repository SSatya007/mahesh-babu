<!DOCTYPE html>
<html>
<head>
<title>Celebration</title>

<style>

body{
background:#ffc0cb;
text-align:center;
font-family:Arial;
margin:0;
}

h1{
margin-top:50px;
font-size:40px;
}

/* slideshow image */

#photo{
width:400px;
border-radius:15px;
margin-top:40px;
animation:zoom 3s infinite alternate;
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

/* messages */

.section{
margin-top:120px;
font-size:25px;
padding:40px;
}

</style>

</head>

<body>

<h1>🎉 Let the Celebration Begin 🎉</h1>

<img id="photo" src="mahesh babu.jpg">

<script>

let pics=[
"mahesh babu.jpg",
"mahesh babu1.jpg",
"mahesh babu2.jpg",
"mahesh babu3.jpg"
];

let i=0;

setInterval(function(){

i++;
if(i>=pics.length){i=0;}

document.getElementById("photo").src=pics[i];

},3000);

</script>

<div class="section">
💖 Wishing you a day filled with happiness
</div>

<div class="section">
🎂 May your birthday be as special as you
</div>

<div class="section">
✨ Have an amazing year ahead
</div>

<div class="section">
🎉 Happy Birthday once again
</div>

</body>
</html>

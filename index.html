<!DOCTYPE html>
<html>
<head>

<title>Happy Birthday</title>

<style>

body{
background:pink;
text-align:center;
font-family:Arial;
overflow:hidden;
}

/* Heading */

h1{
margin-top:40px;
}

/* Button */

button{
padding:12px 30px;
font-size:18px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* Slideshow */

.slideshow{
display:none;
margin-top:40px;
}

.slideshow img{
width:320px;
border-radius:20px;
animation:breathing 4s infinite ease-in-out;
}

/* Breathing zoom */

@keyframes breathing{

0%{transform:scale(1);}

50%{transform:scale(1.12);}

100%{transform:scale(1);}

}

/* Floating icons */

.icon{
position:fixed;
bottom:-20px;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-1000px);}
}

</style>

</head>

<body>

<h1>Happy Birthday Mahesh Babu ❤️</h1>

<button onclick="start()">PLZ CLICK BUTTON 🎉</button>

<div class="slideshow" id="slideshow">

<img id="slide" src="mahesh babu.jpg">

</div>

<script>

/* Photos list */

let photos = [
"mahesh babu.jpg",
"mahesh babu1.jpg",
"mahesh babu2.jpg",
"mahesh babu3.jpg"
];

let index = 0;

/* Button click */

function start(){

document.getElementById("slideshow").style.display="block";

setInterval(changePhoto,3000);

}

/* Slideshow */

function changePhoto(){

index++;

if(index >= photos.length){
index = 0;
}

document.getElementById("slide").src = photos[index];

}

/* Floating hearts butterflies flowers */

setInterval(function(){

let icon = document.createElement("div");

icon.className="icon";

let icons = ["❤️","💖","💗","🦋","🌸","🌺"];

icon.innerHTML = icons[Math.floor(Math.random()*icons.length)];

icon.style.left=Math.random()*100+"%";

document.body.appendChild(icon);

setTimeout(()=>{
icon.remove();
},6000);

},500);

</script>

</body>
</html>
